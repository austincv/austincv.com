name: Deploy to GitHub Pages (production)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir _site
          cp index.html  _site/
          cp favicon.svg _site/
          cp -r css      _site/
          cp -r js       _site/
          cp -r data     _site/
          cp -r assets   _site/
          touch _site/.nojekyll

      - name: Deploy to gh-pages (root)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: _site
          clean: true
          clean-exclude: |
            dev/
          cname: austincv.com
