name: Deploy to GitHub Pages (dev preview)

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-dev
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir _site
          cp index.html  _site/
          cp favicon.svg _site/
          cp -r css      _site/
          cp -r js       _site/
          cp -r data     _site/
          cp -r assets   _site/
          touch _site/.nojekyll

      - name: Deploy to gh-pages (dev/)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: _site
          target-folder: dev
          clean: true
