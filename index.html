<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="only light">
<style>
  @media screen and (max-width: 768px) and (orientation: landscape) {
    body { display: none; }
    .orientation-msg {
      display: flex !important;
    }
  }
</style>
<title>Austin Chungath Vincent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0d0d0d;
    --white: #fafaf8;
    --grey: #888;
    --light: #e8e8e4;
    --card-w: 260px;
    --card-h: 360px;
  }

  html {
    scroll-behavior: auto;
    color-scheme: only light;
  }

  body {
    background: var(--white);
    color: var(--black);
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
  }

  /* ─── DESKTOP ─────────────────────────────────────────── */
  .desktop { display: flex; }
  .mobile  { display: none; }

  /* Left panel */
  .left-panel {
    position: fixed;
    top: 0; left: 0;
    width: 42vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 6vw 0 8vw;
    z-index: 10;
  }

  .left-panel .eyebrow {
    font-size: 11px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--grey);
    margin-bottom: 20px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity .5s, transform .5s;
  }

  .left-panel .headline {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(2.4rem, 4vw, 3.8rem);
    line-height: 1.08;
    letter-spacing: -.02em;
    margin-bottom: 20px;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity .5s .06s, transform .5s .06s;
  }

  .left-panel .sub {
    font-size: 14px;
    line-height: 1.65;
    color: #555;
    max-width: 320px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity .5s .12s, transform .5s .12s;
  }

  .left-panel.visible .eyebrow,
  .left-panel.visible .headline,
  .left-panel.visible .sub { opacity: 1; transform: none; }

  .links {
    display: flex;
    gap: 16px;
    margin-top: 40px;
  }

  .links a {
    font-size: 12px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--black);
    text-decoration: none;
    border-bottom: 1px solid var(--black);
    padding-bottom: 2px;
    transition: opacity .2s;
  }
  .links a:hover { opacity: .4; }

  /* Right scroll track */
  .right-track {
    margin-left: 42vw;
    width: 58vw;
  }

  .scroll-spacer {
    /* Each role gets ~120vh of scroll space */
  }

  /* Sticky card stage */
  .card-stage {
    position: sticky;
    top: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    perspective: 1200px;
  }

  /* ─── ID CARD ─────────────────────────────────────────── */
  .id-card-wrap {
    position: relative;
    width: var(--card-w);
  }

  /* Lanyard */
  .lanyard {
    position: absolute;
    top: -80px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .lanyard-cord {
    width: 3px;
    height: 60px;
    background: linear-gradient(180deg, #c8c8c8, #a0a0a0);
    border-radius: 2px;
  }

  .lanyard-clip {
    width: 14px;
    height: 18px;
    border: 2.5px solid #999;
    border-radius: 3px 3px 6px 6px;
    background: #d4d4d4;
    margin-top: -1px;
  }

  /* Card container — single face, no preserve-3d needed */
  .card-3d {
    width: var(--card-w);
    height: var(--card-h);
    border-radius: 12px;
    overflow: hidden;
    background: #fff;
    filter: drop-shadow(0 30px 60px rgba(0,0,0,.18));
    transform: rotate(-2deg);
    position: relative;
    /* JS will drive rotateY via inline style */
  }

  .card-3d.swinging {
    animation: swing 4s ease-in-out infinite;
  }

  @keyframes swing {
    0%,100% { transform: rotate(-2deg); }
    25%      { transform: rotate(1deg); }
    75%      { transform: rotate(-3deg); }
  }

  /* The single visible face */
  .card-face {
    position: absolute;
    inset: 0;
    border-radius: 12px;
    overflow: hidden;
    background: #fff;
  }

  /* hide the unused back element */
  .card-face.back { display: none; }

  /* Card interior */
  .card-inner {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 20px 20px;
    position: relative;
  }

  .card-top-stripe {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: var(--accent, #0d0d0d);
  }

  .card-label {
    font-size: 8px;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: #aaa;
    margin-bottom: 20px;
    margin-top: 6px;
  }

  .card-photo {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    object-fit: cover;
    object-position: center top;
    border: 3px solid #f0f0f0;
    margin-bottom: 18px;
    flex-shrink: 0;
  }

  .card-photo-placeholder {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: #e8e8e8;
    margin-bottom: 18px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    color: #aaa;
  }

  .card-name {
    font-family: 'Instrument Serif', serif;
    font-size: 18px;
    text-align: center;
    line-height: 1.2;
    margin-bottom: 6px;
    color: #111;
  }

  .card-title {
    font-size: 9px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--accent, #0d0d0d);
    margin-bottom: 16px;
    text-align: center;
  }

  .card-divider {
    width: 30px;
    height: 1px;
    background: #e0e0e0;
    margin-bottom: 16px;
  }

  .card-company-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: auto;
  }

  .card-company-icon {
    width: 20px;
    height: 20px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    color: #fff;
    background: var(--accent, #0d0d0d);
    flex-shrink: 0;
  }

  .card-company-name {
    font-size: 10px;
    letter-spacing: .12em;
    text-transform: uppercase;
    font-weight: 500;
    color: #333;
  }

  .card-barcode {
    margin-top: 14px;
    display: flex;
    gap: 1.5px;
  }

  .card-barcode span {
    display: block;
    height: 16px;
    background: #222;
    border-radius: 1px;
  }

  .card-dates {
    font-size: 9px;
    color: #bbb;
    letter-spacing: .08em;
    margin-top: 8px;
  }

  /* Role sections */
  .role-section {
    height: 120vh;
  }
  .role-section:first-child {
    height: 100vh;
  }

  /* ─── MOBILE ───────────────────────────────────────────── */
  @media (max-width: 768px) {
    .desktop { display: none; }

    /* Fill exact screen height — dvh accounts for Safari's collapsible toolbar */
    .mobile {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      height: 100vh; /* fallback for older browsers */
      overflow: hidden;
    }

    .mobile-header {
      flex-shrink: 0;
      padding: 32px 28px 12px;
    }

    .mobile-header h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 1.6rem;
      line-height: 1.1;
      letter-spacing: -.02em;
      margin-bottom: 4px;
    }

    .mobile-header p {
      font-size: 12px;
      color: var(--grey);
      letter-spacing: .04em;
    }

    /* Card area grows to fill remaining space */
    .mobile-swipe-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      min-height: 0; /* critical: allows flex-shrink below min-content */
    }

    /* Card scales down to fit whatever height the flex area gives */
    .mobile-card-stack {
      position: relative;
      width: min(260px, 72vw);
      height: min(360px, 58vh);
      --card-w: min(260px, 72vw);
      --card-h: min(360px, 58vh);
    }

    .mobile-card {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 16px 48px rgba(0,0,0,.14);
      transition: transform .4s cubic-bezier(0.4,0,0.2,1), opacity .4s;
      overflow: hidden;
      cursor: grab;
      user-select: none;
    }

    .mobile-card.active   { transform: translateX(0) scale(1);     opacity: 1;  z-index: 3; }
    .mobile-card.prev     { transform: translateX(-100%) scale(.9); opacity: 0;  z-index: 1; }
    .mobile-card.next     { transform: translateX(100%)  scale(.9); opacity: 0;  z-index: 1; }
    .mobile-card.behind-l { transform: translateX(-10px) scale(.94); opacity: .4; z-index: 2; }
    .mobile-card.behind-r { transform: translateX(10px)  scale(.94); opacity: .4; z-index: 2; pointer-events: none; }
    .mobile-card.dragging { transition: none; cursor: grabbing; }

    .mobile-progress {
      flex-shrink: 0;
      display: flex;
      gap: 6px;
      justify-content: center;
      padding: 8px 0;
    }

    .mobile-progress-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #ddd;
      transition: background .3s, transform .3s;
    }
    .mobile-progress-dot.active { background: var(--black); transform: scale(1.4); }

    .mobile-role-copy {
      flex-shrink: 0;
      padding: 0 28px;
      height: 64px;
      overflow: hidden;
    }

    .mobile-role-copy .role-eyebrow {
      font-size: 10px;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--grey);
      margin-bottom: 4px;
    }

    .mobile-role-copy .role-desc {
      font-size: 12px;
      line-height: 1.5;
      color: #444;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .mobile-nav {
      flex-shrink: 0;
      display: flex;
      gap: 8px;
      justify-content: center;
      padding: 8px 0;
    }

    .mobile-nav button {
      background: none;
      border: 1px solid #ddd;
      border-radius: 50%;
      width: 34px; height: 34px;
      font-size: 13px;
      cursor: pointer;
      transition: border-color .2s;
    }
    .mobile-nav button:hover { border-color: #aaa; }

    .mobile-links {
      flex-shrink: 0;
      display: flex;
      gap: 10px;
      padding: 8px 28px 28px;
      justify-content: center;
    }

    /* Safe area padding for iPhone home indicator */
    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      .mobile-links {
        padding-bottom: max(20px, env(safe-area-inset-bottom));
      }
    }

    .mobile-links a {
      flex: 1;
      max-width: 160px;
      text-align: center;
      padding: 11px 0;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 11px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--black);
      text-decoration: none;
      transition: background .2s, color .2s;
    }
    /* Scale card internals for smaller mobile card */
    .mobile-card-stack .card-inner {
      padding: 20px 16px 16px;
    }
    .mobile-card-stack .card-photo,
    .mobile-card-stack .card-photo-placeholder {
      width: 72px;
      height: 72px;
      margin-bottom: 12px;
    }
    .mobile-card-stack .card-photo-placeholder { font-size: 22px; }
    .mobile-card-stack .card-name { font-size: 15px; margin-bottom: 4px; }
    .mobile-card-stack .card-label { margin-bottom: 12px; }
  }
</style>
</head>
<body>

<!-- Landscape block for mobile -->
<div class="orientation-msg" style="display:none; position:fixed; inset:0; background:#fafaf8; z-index:9999; flex-direction:column; align-items:center; justify-content:center; gap:16px; font-family:'DM Sans',sans-serif; color:#0d0d0d;">
  <div style="font-size:36px;">↺</div>
  <div style="font-size:13px; letter-spacing:.12em; text-transform:uppercase;">Please rotate your device</div>
</div>

<!-- ════════════════════ DESKTOP ════════════════════ -->
<div class="desktop">

  <!-- Left fixed panel -->
  <div class="left-panel" id="leftPanel">
    <div class="eyebrow" id="lpEyebrow">Data Engineering</div>
    <h2 class="headline" id="lpHeadline">Building data<br>platforms<br><em>that scale.</em></h2>
    <p class="sub" id="lpSub">Over a decade designing end-to-end data systems — from fintech to agri-AI.</p>
    <div class="links">
      <a href="https://linkedin.com/in/austincv" target="_blank">LinkedIn</a>
      <a href="https://github.com/austincv" target="_blank">GitHub</a>

    </div>
  </div>

  <!-- Right scrollable track -->
  <div class="right-track" id="rightTrack">

    <!-- Role 0 – DOJO (current) -->
    <div class="role-section" data-role="0"></div>

    <!-- Role 1 – Hummingbird -->
    <div class="role-section" data-role="1"></div>

    <!-- Role 2 – Think Big -->
    <div class="role-section" data-role="2"></div>

    <!-- Role 3 – Big Data Partnership -->
    <div class="role-section" data-role="3"></div>

    <!-- Role 4 – Mu Sigma -->
    <div class="role-section" data-role="4"></div>

    <!-- Final spacer -->
    <div style="height: 60vh;"></div>

  </div>

  <!-- Sticky card stage (sits above the right track) -->
  <div class="card-stage" id="cardStage" style="position:fixed; right:0; width:58vw; top:0; height:100vh;">
    <div class="id-card-wrap">
      <div class="lanyard">
        <div class="lanyard-cord"></div>
        <div class="lanyard-clip"></div>
      </div>
      <div class="card-3d swinging" id="card3d">
        <div class="card-face front" id="cardFront"></div>
        <div class="card-face back"  id="cardBack"></div>
      </div>
    </div>
  </div>

</div>

<!-- ════════════════════ MOBILE ════════════════════ -->
<div class="mobile">
  <div class="mobile-header">
    <h1>Austin<br>Chungath<br>Vincent</h1>
    <p>Data Engineering · London</p>
  </div>

  <div class="mobile-swipe-area" id="mobileSwipeArea">
    <div class="mobile-card-stack" id="mobileCardStack"></div>
  </div>

  <div class="mobile-progress" id="mobileProgress"></div>

  <div class="mobile-role-copy" id="mobileRoleCopy">
    <div class="role-eyebrow" id="mobileEyebrow"></div>
    <div class="role-desc"    id="mobileDesc"></div>
  </div>

  <div class="mobile-nav">
    <button id="mPrev" aria-label="Previous">←</button>
    <button id="mNext" aria-label="Next">→</button>
  </div>

  <div class="mobile-links">
    <a href="https://linkedin.com/in/austincv" target="_blank">LinkedIn</a>
    <a href="https://github.com/austincv"      target="_blank">GitHub</a>
  </div>
</div>

<script>
// ─── DATA ─────────────────────────────────────────────────────
const PHOTO = '/mnt/user-data/uploads/Dojo_Headshots_Day_010040.jpg';

const roles = [
  {
    company:   'DOJO',
    title:     'Lead Data Engineer',
    dates:     'Apr 2021 – Oct 2025',
    accent:    '#1a1a2e',
    icon:      'D',
    headline:  'Building data\nplatforms\nthat scale.',
    eyebrow:   'Data Engineering',
    sub:       'Designed a state-of-the-art analytics platform used by 18+ teams, saving ~£1.3M in compute costs.',
  },
  {
    company:   'Hummingbird',
    title:     'Principal Technical Architect',
    dates:     'Oct 2016 – Apr 2021',
    accent:    '#1e4d2b',
    icon:      'H',
    headline:  'Shaping ML\npipelines from\nthe ground up.',
    eyebrow:   'AI for Agriculture',
    sub:       'Founding engineer — built the ML data pipeline and MLOps infrastructure for satellite image analysis.',
  },
  {
    company:   'Think Big',
    title:     'Big Data Engineer',
    dates:     'Jul 2016 – Oct 2016',
    accent:    '#2d1b69',
    icon:      'T',
    headline:  'Moving big\ndata at\nVodafone scale.',
    eyebrow:   'Big Data · Teradata',
    sub:       'Migrated analytics infrastructure to a Spark cluster, reducing workflow time from days to hours.',
  },
  {
    company:   'Big Data Partnership',
    title:     'Big Data Engineer',
    dates:     'Sep 2014 – Jul 2016',
    accent:    '#7c2d12',
    icon:      'B',
    headline:  'Sentiment,\nvideo & live\ninfrastructure.',
    eyebrow:   'Big Data',
    sub:       'Built Brandmatcher sentiment analysis, vehicle classification with deep learning, and ELK monitoring.',
  },
  {
    company:   'Mu Sigma',
    title:     'Senior Research Analyst',
    dates:     'Jan 2014 – Aug 2014',
    accent:    '#374151',
    icon:      'μ',
    headline:  'Research &\nalgorithms at\nthe start.',
    eyebrow:   'Research · Bangalore',
    sub:       'Led a team building a video processing framework on Hadoop and image algorithms in OpenCV/Python.',
  },
];

// ─── CARD BUILDER ─────────────────────────────────────────────
function buildCardInner(role, includePhoto) {
  const bars = [2,3,1,4,2,3,1,2,4,1,3,2,1,4,2,3,1,2].map(w =>
    `<span style="width:${w * 2}px"></span>`).join('');

  return `
    <div class="card-inner" style="--accent:${role.accent}">
      <div class="card-top-stripe"></div>
      <div class="card-label">ID · ${role.company.toUpperCase()}</div>
      ${includePhoto
        ? `<img class="card-photo" src="${PHOTO}" alt="Austin Chungath Vincent" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        : ''}
      <div class="card-photo-placeholder" ${includePhoto ? 'style="display:none"' : ''}>👤</div>
      <div class="card-name">Austin<br>Chungath Vincent</div>
      <div class="card-title">${role.title}</div>
      <div class="card-divider"></div>
      <div class="card-company-row">
        <div class="card-company-icon">${role.icon}</div>
        <div class="card-company-name">${role.company}</div>
      </div>
      <div class="card-barcode">${bars}</div>
      <div class="card-dates">${role.dates}</div>
    </div>`;
}

// ─── DESKTOP ──────────────────────────────────────────────────
(function desktopInit() {
  const card3d    = document.getElementById('card3d');
  const cardFront = document.getElementById('cardFront');
  const lpEyebrow  = document.getElementById('lpEyebrow');
  const lpHeadline = document.getElementById('lpHeadline');
  const lpSub      = document.getElementById('lpSub');
  const leftPanel  = document.getElementById('leftPanel');

  let currentRole = 0;
  let animating   = false;

  // Populate initial card
  cardFront.innerHTML = buildCardInner(roles[0], true);

  // Animate in on load
  setTimeout(() => leftPanel.classList.add('visible'), 200);

  function updateLeft(role) {
    leftPanel.classList.remove('visible');
    setTimeout(() => {
      lpEyebrow.textContent = role.eyebrow;
      lpHeadline.innerHTML  = role.headline.replace(/\n/g, '<br>');
      lpSub.textContent     = role.sub;
      leftPanel.classList.add('visible');
    }, 280);
  }

  function setCardTransform(rotY, tilt) {
    card3d.style.transform = `perspective(900px) rotateY(${rotY}deg) rotate(${tilt}deg)`;
  }

  function rotateTo(idx) {
    if (idx === currentRole || animating) return;
    animating = true;

    const nextIdx = idx;
    currentRole = idx;

    // Stop swing
    card3d.classList.remove('swinging');

    // Phase 1: spin out to 90° (edge-on — card disappears)
    card3d.style.transition = 'transform 0.28s cubic-bezier(0.4,0,1,1)';
    setCardTransform(90, -1);

    // At 90° the card is invisible — swap content, then spin back in
    setTimeout(() => {
      // Swap content while invisible
      cardFront.innerHTML = buildCardInner(roles[nextIdx], nextIdx === 0);

      // Phase 2: spin in from -90° to 0° — new card, correct orientation
      card3d.style.transition = 'none';
      setCardTransform(-90, -1);

      // Force reflow so transition applies
      void card3d.offsetWidth;

      card3d.style.transition = 'transform 0.32s cubic-bezier(0,0,0.3,1)';
      setCardTransform(0, -2);

      // Update left copy halfway through spin-in
      updateLeft(roles[nextIdx]);

      setTimeout(() => {
        animating = false;
        card3d.style.transition = '';
        card3d.style.transform  = '';
        card3d.classList.add('swinging');
      }, 340);

    }, 290);
  }

  // Scroll-driven role detection
  let ticking = false;
  window.addEventListener('scroll', () => {
    if (ticking) return;
    ticking = true;
    requestAnimationFrame(() => {
      ticking = false;
      const sections = document.querySelectorAll('.role-section');
      const vh = window.innerHeight;
      let activeIdx = 0;
      sections.forEach((sec, i) => {
        const rect = sec.getBoundingClientRect();
        if (rect.top < vh * 0.5) activeIdx = i;
      });
      if (activeIdx !== currentRole) rotateTo(activeIdx);
    });
  });
})();

// ─── MOBILE ───────────────────────────────────────────────────
(function mobileInit() {
  const stack    = document.getElementById('mobileCardStack');
  const progress = document.getElementById('mobileProgress');
  const eyebrow  = document.getElementById('mobileEyebrow');
  const desc     = document.getElementById('mobileDesc');
  const btnPrev  = document.getElementById('mPrev');
  const btnNext  = document.getElementById('mNext');

  let current = 0;
  const total  = roles.length;

  // Build cards
  roles.forEach((role, i) => {
    const card = document.createElement('div');
    card.className = 'mobile-card';
    card.innerHTML = buildCardInner(role, i === 0);
    card.dataset.idx = i;
    stack.appendChild(card);
  });

  // Build progress dots
  roles.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'mobile-progress-dot';
    progress.appendChild(dot);
  });

  function getCardEl(idx) {
    return stack.querySelector(`[data-idx="${idx}"]`);
  }

  function updateUI(instant) {
    roles.forEach((_, i) => {
      const el = getCardEl(i);
      el.className = 'mobile-card';
      if (i === current) el.classList.add('active');
      else if (i === current - 1) el.classList.add('behind-l');
      else if (i === current + 1) el.classList.add('behind-r');
      else el.classList.add(i < current ? 'prev' : 'next');
    });

    // Progress
    document.querySelectorAll('.mobile-progress-dot').forEach((d, i) => {
      d.classList.toggle('active', i === current);
    });

    // Copy
    eyebrow.textContent = roles[current].company + ' · ' + roles[current].dates;
    desc.textContent    = roles[current].sub;
  }

  function goTo(idx) {
    current = Math.max(0, Math.min(total - 1, idx));
    updateUI();
  }

  btnPrev.addEventListener('click', () => goTo(current - 1));
  btnNext.addEventListener('click', () => goTo(current + 1));

  // Touch / swipe
  let startX = 0, startY = 0, isDragging = false;
  const THRESHOLD = 60;

  stack.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    isDragging = true;
  }, { passive: true });

  stack.addEventListener('touchmove', e => {
    if (!isDragging) return;
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    if (Math.abs(dx) > Math.abs(dy)) {
      const card = getCardEl(current);
      card.style.transform = `translateX(${dx}px) scale(1)`;
      card.classList.add('dragging');
    }
  }, { passive: true });

  stack.addEventListener('touchend', e => {
    if (!isDragging) return;
    isDragging = false;
    const dx = e.changedTouches[0].clientX - startX;
    const card = getCardEl(current);
    card.classList.remove('dragging');
    card.style.transform = '';

    if (dx < -THRESHOLD) goTo(current + 1);
    else if (dx > THRESHOLD) goTo(current - 1);
  });

  // Mouse drag (desktop fallback)
  let mouseStart = 0, mouseDown = false;
  stack.addEventListener('mousedown', e => { mouseStart = e.clientX; mouseDown = true; });
  stack.addEventListener('mousemove', e => {
    if (!mouseDown) return;
    const card = getCardEl(current);
    card.style.transform = `translateX(${e.clientX - mouseStart}px) scale(1)`;
    card.classList.add('dragging');
  });
  stack.addEventListener('mouseup', e => {
    if (!mouseDown) return;
    mouseDown = false;
    const dx = e.clientX - mouseStart;
    const card = getCardEl(current);
    card.classList.remove('dragging');
    card.style.transform = '';
    if (dx < -THRESHOLD) goTo(current + 1);
    else if (dx > THRESHOLD) goTo(current - 1);
  });
  stack.addEventListener('mouseleave', () => {
    if (mouseDown) {
      mouseDown = false;
      const card = getCardEl(current);
      card.classList.remove('dragging');
      card.style.transform = '';
    }
  });

  updateUI();
})();
</script>
</body>
</html>
