<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="only light">
<title>Austin Chungath Vincent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- Landscape block for mobile -->
<div class="orientation-msg" style="display:none; position:fixed; inset:0; background:#fafaf8; z-index:9999; flex-direction:column; align-items:center; justify-content:center; gap:16px; font-family:'DM Sans',sans-serif; color:#0d0d0d;">
  <div style="font-size:36px;">↺</div>
  <div style="font-size:13px; letter-spacing:.12em; text-transform:uppercase;">Please rotate your device</div>
</div>

<!-- ════════════════════ DESKTOP ════════════════════ -->
<div class="desktop">

  <!-- Left fixed panel -->
  <div class="left-panel" id="leftPanel">
    <div class="eyebrow" id="lpEyebrow"></div>
    <h2 class="headline" id="lpHeadline"></h2>
    <p class="sub" id="lpSub"></p>
    <div class="links">
      <a href="https://linkedin.com/in/austincv" target="_blank" class="linkedin-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
        Let's connect
      </a>
    </div>
  </div>

  <!-- Right scrollable track -->
  <div class="right-track" id="rightTrack"></div>

  <!-- Sticky card stage -->
  <div class="card-stage">
    <div class="id-card-wrap">
      <div class="card-shadow" id="cardShadow"></div>
      <div class="card-3d" id="card3d">
        <div class="card-face front" id="cardFront"></div>
      </div>
    </div>
  </div>

</div>

<!-- ════════════════════ MOBILE ════════════════════ -->
<div class="mobile">
  <div class="mobile-header" id="mobileHeader">
    <div class="mobile-eyebrow" id="mobileEyebrow"></div>
    <div class="mobile-headline" id="mobileHeadline"></div>
  </div>

  <div class="mobile-swipe-area" id="mobileSwipeArea"></div>
  <div class="mobile-footer">
    <div class="mobile-progress" id="mobileProgress"></div>
  </div>
</div>

<script src="js/main.js"></script>
</body>
</html>
